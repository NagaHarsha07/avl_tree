<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AVL Tree Visualizer</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-insert { background: #28a745; }
        .btn-clear { background: #dc3545; margin-left: 10px; }
        #canvas { width: 100%; height: 500px; border: 1px solid #eee; overflow: auto; }
        circle { fill: white; stroke: #007bff; stroke-width: 2.5; }
        text { font-size: 12px; font-weight: bold; fill: #333; }
        line { stroke: #ccc; stroke-width: 2; }
    </style>
</head>
<body>

<div class="container">
    <h1>AVL Tree Visualizer</h1>
    <div class="controls">
        <input type="number" id="nodeValue" placeholder="Enter Value">
        <button class="btn-insert" onclick="handleAdd()">Insert Node</button>
        <button class="btn-clear" onclick="clearTree()">Clear Tree</button>
    </div>
    <div id="canvas">
        <svg id="treeSvg" width="1000" height="500"></svg>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
